<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>CCF Meter — 胸骨圧迫フラクション測定</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f5f5f3;
      --bg3: #ebebea;
      --text: #1a1a19;
      --text2: #6b6b68;
      --text3: #9e9e9a;
      --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.22);
      --radius: 8px;
      --radius-lg: 12px;
      --green: #1D9E75;
      --amber: #BA7517;
      --red: #E24B4A;
      --blue: #185FA5;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1b;
        --bg2: #252524;
        --bg3: #2e2e2c;
        --text: #f0efea;
        --text2: #a0a09b;
        --text3: #6b6b68;
        --border: rgba(255,255,255,0.10);
        --border2: rgba(255,255,255,0.20);
      }
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
      font-size: 16px;
      line-height: 1.5;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      max-width: 540px;
      margin: 0 auto;
      padding: 16px 16px 40px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
    }
    .header h1 span {
      font-size: 12px;
      font-weight: 400;
      color: var(--text2);
      margin-left: 6px;
    }

    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 14px;
      height: 20px;
    }
    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 7px;
      flex-shrink: 0;
    }
    .dot-idle   { background: var(--text3); }
    .dot-comp   { background: var(--green); animation: pulse 1s infinite; }
    .dot-pause  { background: var(--amber); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
    .clock {
      margin-left: auto;
      font-size: 14px;
      font-variant-numeric: tabular-nums;
      font-weight: 500;
    }

    /* CCF big number */
    .ccf-block {
      text-align: center;
      margin: 4px 0 12px;
    }
    .ccf-num {
      font-size: 72px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -2px;
      transition: color 0.3s;
    }
    .ccf-unit {
      font-size: 20px;
      font-weight: 400;
      color: var(--text2);
      margin-left: 4px;
    }
    .ccf-sub {
      font-size: 12px;
      color: var(--text3);
      margin-top: 4px;
    }

    /* Progress bar */
    .bar-wrap {
      height: 10px;
      background: var(--bg2);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 5px;
      border: 0.5px solid var(--border);
    }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.3s, background 0.3s;
      width: 0%;
      background: var(--blue);
    }
    .threshold-hint {
      font-size: 11px;
      color: var(--text3);
      text-align: center;
      margin-bottom: 14px;
    }

    /* Metric cards */
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 8px;
      margin-bottom: 14px;
    }
    .metric {
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 10px 12px;
    }
    .metric .m-label {
      font-size: 11px;
      color: var(--text3);
      margin-bottom: 3px;
    }
    .metric .m-val {
      font-size: 22px;
      font-weight: 600;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .metric .m-unit {
      font-size: 11px;
      color: var(--text3);
    }

    /* Buttons */
    .btn-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .btn {
      flex: 1;
      padding: 15px 10px;
      border-radius: var(--radius-lg);
      border: 2px solid var(--border2);
      background: var(--bg2);
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: background 0.1s, transform 0.1s, box-shadow 0.1s, opacity 0.15s;
      -webkit-user-select: none;
      user-select: none;
      box-shadow: 0 2px 0 var(--border2);
    }
    .btn:active {
      transform: translateY(2px);
      box-shadow: none;
    }
    .btn:disabled { opacity: 0.3; cursor: default; transform: none; box-shadow: 0 2px 0 var(--border2); }

    .btn-start {
      background: var(--blue);
      color: #fff;
      border-color: #0C447C;
      font-size: 16px;
      box-shadow: 0 3px 0 #0C447C;
    }
    .btn-start:active { background: #0C447C !important; color: #fff !important; box-shadow: none; }

    .btn-stop {
      background: var(--bg2);
      border-color: var(--border2);
      font-size: 16px;
      box-shadow: 0 3px 0 var(--border2);
    }

    .btn-danger { color: var(--red); border-color: rgba(226,75,74,0.4); box-shadow: 0 2px 0 rgba(226,75,74,0.3); }

    .btn-pause-active {
      background: #FAEEDA;
      color: #633806;
      border-color: #854F0B;
    }
    .btn-green {
      background: #1D9E75;
      color: #fff;
      border-color: #0F6E56;
      box-shadow: 0 3px 0 #0F6E56;
    }
    .btn-green:active { background: #0F6E56 !important; color: #fff !important; box-shadow: none !important; }
    .btn-red {
      background: #E24B4A;
      color: #fff;
      border-color: #A32D2D;
      box-shadow: 0 3px 0 #A32D2D;
    }
    .btn-red:active { background: #A32D2D !important; color: #fff !important; box-shadow: none !important; }
    .btn-start:active { background: #0C447C !important; color: #fff !important; }
    @media (prefers-color-scheme: dark) {
      .btn-pause-active { background: #3a2200; color: #FAC775; border-color: #BA7517; }
      .btn-green { background: #0F6E56; border-color: #085041; color: #fff; }
      .btn-red   { background: #A32D2D; border-color: #791F1F; color: #fff; }
    }

    /* Divider & section labels */
    .divider { height: 0.5px; background: var(--border); margin: 14px 0; }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .pause-reason-label {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 7px;
    }

    /* Event log */
    .log {
      max-height: 130px;
      overflow-y: auto;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--bg2);
    }
    .log-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 12px;
      border-bottom: 0.5px solid var(--border);
      font-size: 13px;
    }
    .log-row:last-child { border-bottom: none; }
    .log-tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 99px;
      font-weight: 500;
      flex-shrink: 0;
      margin-left: 8px;
    }
    .tag-comp    { background: #dbeeff; color: #0C447C; }
    .tag-vent    { background: #d6efc0; color: #27500A; }
    .tag-rhythm  { background: #e8e6ff; color: #3C3489; }
    .tag-unknown { background: #e5e4de; color: #444441; }
    .tag-pause   { background: #fae5c0; color: #633806; }
    @media (prefers-color-scheme: dark) {
      .tag-comp    { background: #0C447C; color: #B5D4F4; }
      .tag-vent    { background: #27500A; color: #C0DD97; }
      .tag-rhythm  { background: #3C3489; color: #CECBF6; }
      .tag-unknown { background: #444441; color: #D3D1C7; }
      .tag-pause   { background: #633806; color: #FAC775; }
    }
    .log-time { font-size: 11px; color: var(--text3); font-variant-numeric: tabular-nums; margin-left: 6px; }
    .empty-log {
      padding: 16px;
      text-align: center;
      font-size: 13px;
      color: var(--text3);
    }

    /* Chart */
    .chart-wrap { position: relative; width: 100%; height: 180px; margin-bottom: 12px; }
    .chart-toggle-row { display: flex; gap: 6px; margin-bottom: 8px; }
    .chart-toggle {
      padding: 5px 14px;
      border-radius: 99px;
      border: 2px solid var(--border2);
      background: var(--bg2);
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.15s;
    }
    .chart-toggle.active-ccf  { background: #1D9E75; color: #fff; border-color: #0F6E56; }
    .chart-toggle.active-cpp  { background: #9B59B6; color: #fff; border-color: #6C3483; }
    .chart-toggle:active { transform: scale(0.96); }

    /* Report */
    .report-box {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 12px 14px;
      font-size: 12px;
      font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
      color: var(--text2);
      white-space: pre-wrap;
      overflow-x: auto;
      line-height: 1.7;
      margin-bottom: 8px;
    }
    .copy-msg {
      font-size: 12px;
      color: var(--green);
      text-align: center;
      height: 18px;
      margin-bottom: 4px;
    }
    .btn-copy {
      font-size: 13px;
      padding: 10px;
    }

    /* Footer */
    .footer {
      text-align: center;
      font-size: 11px;
      color: var(--text3);
      margin-top: 24px;
    }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>CCF Meter <span>胸骨圧迫フラクション</span></h1>
  </div>

  <!-- Status -->
  <div class="status-bar">
    <span class="status-dot dot-idle" id="dot"></span>
    <span id="status-text">待機中</span>
    <span class="clock" id="clock">00:00</span>
  </div>

  <!-- CCF big number -->
  <div class="ccf-block">
    <div class="ccf-num" id="ccf-val" style="color: var(--blue);">—<span class="ccf-unit"></span></div>
    <div class="ccf-sub">Chest Compression Fraction (%)</div>
  </div>

  <!-- Progress bar -->
  <div class="bar-wrap"><div class="bar-fill" id="bar"></div></div>
  <div class="threshold-hint">80%以上: 良好 &nbsp;|&nbsp; 60–79%: 要改善 &nbsp;|&nbsp; 60%未満: 不十分</div>

  <!-- Metrics -->
  <div class="metric-grid">
    <div class="metric">
      <div class="m-label">圧迫時間</div>
      <div><span class="m-val" id="comp-time">0</span><span class="m-unit"> s</span></div>
    </div>
    <div class="metric">
      <div class="m-label">中断時間</div>
      <div><span class="m-val" id="pause-time">0</span><span class="m-unit"> s</span></div>
    </div>
    <div class="metric">
      <div class="m-label">経過時間</div>
      <div><span class="m-val" id="total-time">0</span><span class="m-unit"> s</span></div>
    </div>
  </div>

  <!-- Main controls -->
  <div class="btn-row">
    <button class="btn btn-start" id="main-btn" onclick="handleMain()">接触</button>
    <button class="btn" id="toggle-btn" onclick="handleToggle()" disabled>圧迫開始</button>
  </div>

  <!-- Pause reason buttons -->
  <div class="divider"></div>
  <div class="pause-reason-label">中断理由（押すと中断開始 / もう一度または「開始」で再開）</div>
  <div class="btn-row">
    <button class="btn" id="btn-vent"    onclick="handlePauseReason('vent','換気')"          disabled>換気</button>
    <button class="btn" id="btn-rhythm"  onclick="handlePauseReason('rhythm','波形確認')"    disabled>波形確認</button>
    <button class="btn" id="btn-unknown" onclick="handlePauseReason('unknown','不明な中断')" disabled>不明な中断</button>
  </div>

  <div class="divider"></div>
  <div class="btn-row">
    <button class="btn btn-danger" onclick="handleReset()">リセット</button>
  </div>

  <!-- Chart -->
  <div class="divider"></div>
  <div class="section-label">CCF 時系列</div>
  <div class="chart-toggle-row">
    <button class="chart-toggle active-ccf" id="toggle-ccf" onclick="toggleWave('ccf')">CCF (%)</button>
    <button class="chart-toggle active-cpp" id="toggle-cpp" onclick="toggleWave('cpp')">CPP (mmHg)</button>
  </div>
  <div class="chart-wrap">
    <canvas id="ccfChart" role="img" aria-label="CCFの時系列推移グラフ">CCF時系列データ</canvas>
  </div>

  <!-- Event log -->
  <div class="divider"></div>
  <div class="section-label">イベントログ</div>
  <div class="log" id="log"><div class="empty-log">ログはここに表示されます</div></div>

  <!-- Report -->
  <div class="divider"></div>
  <div class="section-label">レポート</div>
  <div class="report-box" id="report-box">計測を開始するとレポートが生成されます</div>
  <div class="copy-msg" id="copy-msg"></div>
  <div class="btn-row">
    <button class="btn btn-copy" onclick="copyReport()">テキストをコピー</button>
  </div>

  <div class="footer">CCF Meter — EMS用 胸骨圧迫フラクション測定ツール</div>
</div>

<script>
  // ── State ──────────────────────────────────────────
  let state = 'idle';
  let startTime = null;
  let totalComp = 0, totalPause = 0;
  let currentSegmentStart = null;
  let isCompressing = false;
  let activePauseReason = null;
  let timerInterval = null, chartInterval = null;
  let logs = [];
  let chartLabels = [], chartData = [], cppData = [];
  let myChart = null;
  let currentCPP = 0;
  let cppTarget = 0;        // 漸近的に近づく目標CPP
  let compressionStartTime = null; // 圧迫開始時刻（立ち上がり計算用）
  let compressionStartCPP  = 0;    // 圧迫再開時のCPP残存値
  let pauseStartTime = null;        // 中断開始時刻（逆S字減衰用）
  let pauseStartCPP  = 0;           // 中断開始時のCPP値

  // ── CPP生理学的パラメータ ──────────────────────────
  // 根拠: 大動脈圧は圧迫開始直後には上がらず、
  //       "aortic reserve" 構築に数回分の圧迫が必要（約15回 = 110回/分で約8秒）
  //       中断後の再開も同様に再構築時間が必要
  //       (Lurie et al. Circulation 2002, EMSWorld Science of Compressions,
  //        Steet et al / Berg et al: 15 compressions to re-establish CPP)
  const CPP_MAX       = 40;   // 良質なCPRでの到達目標（mmHg）。ROSCには15〜25必要
  const CPP_RISE_TAU  = 8.2;  // 立ち上がり時定数（秒）: 110回/分で15回≈8.2秒
  const CPP_DECAY_TAU = 1.5;  // 逆S字の変曲点（秒）: 3秒でゼロになる設計
  // 圧迫レート: 110回/分（AHA推奨範囲100〜120の中間値）
  // CPPは圧迫中の "到達目標" に向けて1次遅れで上昇、
  // 中断中は指数関数的に減衰（時定数3.5秒）
  let savedElapsed = 0;
  let wakeLock = null;

  const PAUSE_BTNS = {
    vent:    { id: 'btn-vent',    label: '換気',      tagClass: 'tag-vent'    },
    rhythm:  { id: 'btn-rhythm',  label: '波形確認',   tagClass: 'tag-rhythm'  },
    unknown: { id: 'btn-unknown', label: '不明な中断', tagClass: 'tag-unknown' }
  };

  // ── Helpers ────────────────────────────────────────
  function fmt(s) {
    const m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
  }
  function fmtS(s) { return Math.floor(s * 10) / 10; }
  function now()   { return Date.now() / 1000; }
  function ccfColor(v) {
    return v >= 80 ? '#1D9E75' : v >= 60 ? '#BA7517' : '#E24B4A';
  }
  function tagLabel(type) {
    return { comp:'圧迫', vent:'換気', rhythm:'波形確認', unknown:'不明', pause:'中断' }[type] || '中断';
  }
  function tagClass(type) {
    return { comp:'tag-comp', vent:'tag-vent', rhythm:'tag-rhythm', unknown:'tag-unknown' }[type] || 'tag-pause';
  }

  function setPauseBtnsDisabled(disabled) {
    Object.values(PAUSE_BTNS).forEach(b => {
      document.getElementById(b.id).disabled = disabled;
    });
  }
  function clearPauseBtnActive() {
    Object.values(PAUSE_BTNS).forEach(b => {
      const el = document.getElementById(b.id);
      el.classList.remove('btn-pause-active', 'btn-red');
      el.textContent = b.label;
    });
    activePauseReason = null;
  }

  // ── Pause reason handler ───────────────────────────
  function handlePauseReason(key, label) {
    if (state !== 'running') return;
    const t = now(), el = t - startTime;

    if (activePauseReason === key) {
      // Same button → end pause, resume compression
      totalPause += t - currentSegmentStart;
      addLog(key, label + ' ' + fmtS(t - currentSegmentStart) + 's', el, t - currentSegmentStart);
      clearPauseBtnActive();
      currentSegmentStart = t;
      isCompressing = true;
      document.getElementById('toggle-btn').textContent = '圧迫中断';
      document.getElementById('toggle-btn').classList.remove('btn-green');
      document.getElementById('dot').className = 'status-dot dot-comp';
      document.getElementById('status-text').textContent = '圧迫中';
    } else {
      // Finish current segment
      if (isCompressing && currentSegmentStart) {
        totalComp += t - currentSegmentStart;
        addLog('comp', '圧迫 ' + fmtS(t - currentSegmentStart) + 's', el);
      } else if (activePauseReason && activePauseReason !== key) {
        const prevLabel = PAUSE_BTNS[activePauseReason].label;
        totalPause += t - currentSegmentStart;
        addLog(activePauseReason, prevLabel + ' ' + fmtS(t - currentSegmentStart) + 's', el, t - currentSegmentStart);
      } else if (!isCompressing && currentSegmentStart) {
        totalPause += t - currentSegmentStart;
      }
      // Start new pause reason
      clearPauseBtnActive();
      currentSegmentStart = t;
      isCompressing = false;
      activePauseReason = key;
      const btn = document.getElementById(PAUSE_BTNS[key].id);
      btn.classList.add('btn-pause-active');
      btn.textContent = label + ' 中';
      document.getElementById('toggle-btn').textContent = '圧迫開始';
      document.getElementById('toggle-btn').classList.add('btn-green');
      document.getElementById('dot').className = 'status-dot dot-pause';
      document.getElementById('status-text').textContent = label + ' 中';
    }
  }

  // ── Main button (開始 / 停止) ──────────────────────
  // 停止は一時停止。累積値・ログを保持し、再開時に引き継ぐ。
  function handleMain() {
    if (state === 'idle') {
      // 再開 or 新規開始
      const t = now();
      if (savedElapsed > 0) {
        // 経過時間を引き継いで startTime を逆算
        startTime = t - savedElapsed;
      } else {
        // 新規セッション
        startTime = t;
        totalComp = 0; totalPause = 0;
        logs = [];
        chartLabels.length = 0; chartData.length = 0; cppData.length = 0;
        currentCPP = 0; cppTarget = 0; compressionStartTime = null; compressionStartCPP = 0; pauseStartTime = null; pauseStartCPP = 0;
        if (myChart) myChart.update('none');
        document.getElementById('log').innerHTML = '<div class="empty-log">ログはここに表示されます</div>';
        document.getElementById('report-box').textContent = '計測を開始するとレポートが生成されます';
      }
      currentSegmentStart = t;
      isCompressing = false;
      state = 'running';
      document.getElementById('main-btn').textContent = '記録停止';
      document.getElementById('main-btn').className = 'btn btn-stop';
      document.getElementById('toggle-btn').disabled = false;
      document.getElementById('toggle-btn').textContent = '圧迫開始';
      document.getElementById('toggle-btn').classList.add('btn-green');
      document.getElementById('dot').className = 'status-dot dot-pause';
      document.getElementById('status-text').textContent = '中断中';
      setPauseBtnsDisabled(false);
      timerInterval = setInterval(updateUI, 200);
      chartInterval = setInterval(updateChart, 500);
    } else {
      // 中断理由アクティブ中は圧迫再開として扱う
      if (activePauseReason) {
        handlePauseReason(activePauseReason, PAUSE_BTNS[activePauseReason].label);
        return;
      }
      // 一時停止
      const t = now(), el = t - startTime;
      if (isCompressing && currentSegmentStart) {
        totalComp += t - currentSegmentStart;
        addLog('comp', '圧迫終了', el);
      } else if (currentSegmentStart) {
        totalPause += t - currentSegmentStart;
        addLog('pause', '中断終了', el, t - currentSegmentStart);
      }
      // 経過時間を保存（再開時に引き継ぐ）
      savedElapsed = t - startTime;
      currentSegmentStart = null;
      isCompressing = false;
      state = 'idle';
      clearInterval(timerInterval); clearInterval(chartInterval);
      updateUI();
      document.getElementById('main-btn').textContent = '接触';
      document.getElementById('main-btn').className = 'btn btn-start';
      document.getElementById('toggle-btn').disabled = true;
      document.getElementById('toggle-btn').textContent = '圧迫開始';
      document.getElementById('toggle-btn').classList.remove('btn-green');
      document.getElementById('dot').className = 'status-dot dot-idle';
      document.getElementById('status-text').textContent = '一時停止中';
      setPauseBtnsDisabled(true);
    }
  }

  // ── Toggle compression ─────────────────────────────
  function handleToggle() {
    if (state !== 'running') return;
    const t = now(), el = t - startTime;
    if (!isCompressing) {
      // Resume compression (clear any active pause reason)
      if (activePauseReason) {
        totalPause += t - currentSegmentStart;
        addLog(activePauseReason, PAUSE_BTNS[activePauseReason].label + ' ' + fmtS(t - currentSegmentStart) + 's', el, t - currentSegmentStart);
        clearPauseBtnActive();
      } else if (currentSegmentStart) {
        totalPause += t - currentSegmentStart;
        addLog('pause', '中断 ' + fmtS(t - currentSegmentStart) + 's', el, t - currentSegmentStart);
      }
      currentSegmentStart = t; isCompressing = true;
      document.getElementById('toggle-btn').textContent = '圧迫中断';
      document.getElementById('toggle-btn').classList.remove('btn-green');
      document.getElementById('dot').className = 'status-dot dot-comp';
      document.getElementById('status-text').textContent = '圧迫中';
    } else {
      // Pause compression
      totalComp += t - currentSegmentStart;
      addLog('comp', '圧迫 ' + fmtS(t - currentSegmentStart) + 's', el);
      currentSegmentStart = t; isCompressing = false;
      document.getElementById('toggle-btn').textContent = '圧迫開始';
      document.getElementById('toggle-btn').classList.add('btn-green');
      document.getElementById('dot').className = 'status-dot dot-pause';
      document.getElementById('status-text').textContent = '中断中';
    }
  }

  // ── Reset ──────────────────────────────────────────
  function handleReset() {
    clearInterval(timerInterval); clearInterval(chartInterval);
    releaseWakeLock();
    state = 'idle'; startTime = null; savedElapsed = 0;
    totalComp = 0; totalPause = 0;
    currentSegmentStart = null; isCompressing = false;
    activePauseReason = null; logs = [];
    chartLabels.length = 0; chartData.length = 0; cppData.length = 0;
    currentCPP = 0; cppTarget = 0; compressionStartTime = null; compressionStartCPP = 0; pauseStartTime = null; pauseStartCPP = 0;
    if (myChart) myChart.update('none');
    clearPauseBtnActive();
    setPauseBtnsDisabled(true);
    document.getElementById('main-btn').textContent = '接触';
    document.getElementById('main-btn').className = 'btn btn-start';
    document.getElementById('toggle-btn').disabled = true;
    document.getElementById('toggle-btn').textContent = '圧迫開始';
    document.getElementById('toggle-btn').classList.remove('btn-green');
    document.getElementById('ccf-val').innerHTML = '—<span class="ccf-unit"></span>';
    document.getElementById('ccf-val').style.color = 'var(--blue)';
    document.getElementById('bar').style.width = '0%';
    document.getElementById('bar').style.background = 'var(--blue)';
    document.getElementById('comp-time').textContent = '0';
    document.getElementById('pause-time').textContent = '0';
    document.getElementById('total-time').textContent = '0';
    document.getElementById('clock').textContent = '00:00';
    document.getElementById('dot').className = 'status-dot dot-idle';
    document.getElementById('status-text').textContent = '待機中';
    document.getElementById('log').innerHTML = '<div class="empty-log">ログはここに表示されます</div>';
    document.getElementById('report-box').textContent = '計測を開始するとレポートが生成されます';
  }

  // ── UI update ─────────────────────────────────────
  function updateUI() {
    const t    = state === 'idle' ? 0 : (now() - startTime);
    const comp = totalComp  + (isCompressing  && currentSegmentStart ? now() - currentSegmentStart : 0);
    const pause= totalPause + (!isCompressing && currentSegmentStart ? now() - currentSegmentStart : 0);
    const ccf  = t > 0 ? Math.round((comp / t) * 100) : 0;

    document.getElementById('total-time').textContent = fmtS(t);
    document.getElementById('comp-time').textContent  = fmtS(comp);
    document.getElementById('pause-time').textContent = fmtS(pause);
    document.getElementById('clock').textContent      = fmt(t);

    if (state !== 'idle') {
      const color = ccfColor(ccf);
      document.getElementById('ccf-val').innerHTML = ccf + '<span class="ccf-unit"> %</span>';
      document.getElementById('ccf-val').style.color = color;
      document.getElementById('bar').style.width      = ccf + '%';
      document.getElementById('bar').style.background = color;
      updateReport(t, comp, pause, ccf);
    }
  }

  // ── Chart update ───────────────────────────────────
  function updateChart() {
    if (!myChart || state === 'idle') return;
    const t    = now() - startTime;
    const comp = totalComp + (isCompressing && currentSegmentStart ? now() - currentSegmentStart : 0);
    const ccf  = t > 0 ? (comp / t) * 100 : 0;

    // ── 生理学的CPPシミュレーション（0.5秒ごと更新）──────
    // 根拠:
    //  圧迫中: 大動脈圧は "aortic reserve" 構築のため1次遅れで上昇
    //          立ち上がり時定数 CPP_RISE_TAU 秒で目標CPP_MAXに漸近
    //          圧迫開始からの経過時間で目標値を計算
    //  中断中: 10秒でCPPはほぼ0に（時定数3.5秒の指数減衰）
    //          再開時もゼロからの再構築が必要
    const deltaTime = 0.5;

    if (isCompressing) {
      if (!compressionStartTime) {
        compressionStartTime = now();
        // 再圧迫開始時のCPP残存値を起点として保存
        // → 中断が短ければ高い値から再上昇、長ければほぼ0から再構築
        compressionStartCPP = currentCPP;
      }
      const elapsed = now() - compressionStartTime;
      // S字カーブ（シグモイド）: 最初の15回（≈8.2秒）はゆっくり、その後急上昇
      // 変曲点 t0 = CPP_RISE_TAU = 8.2秒、傾き k = 0.55
      const k = 0.55;
      const sig  = 1 / (1 + Math.exp(-k * (elapsed - CPP_RISE_TAU)));
      const sig0 = 1 / (1 + Math.exp(k * CPP_RISE_TAU)); // t=0でのsigmoid
      // 正規化: t=0→0, t→∞→1 のS字（0〜1の範囲）
      const rise = Math.max(0, (sig - sig0) / (1 - sig0));
      // 残存CPP（compressionStartCPP）を起点に CPP_MAX へS字で上昇
      // CPPが既に高い状態で再開した場合は、そこからの差分だけ上昇する
      cppTarget = compressionStartCPP + (CPP_MAX - compressionStartCPP) * rise;
      if (cppTarget < 0) cppTarget = 0;
      // 現在値をtargetに向けてなめらかに追従（追従時定数1.5秒に延長してより緩やかに）
      currentCPP += (cppTarget - currentCPP) * (1 - Math.exp(-deltaTime / 1.5));
    } else {
      // 中断開始 → compressionStartTime をリセット（次の圧迫は0から再構築）
      if (compressionStartTime !== null) {
        // 中断開始時刻を記録
        compressionStartTime = null;
        pauseStartCPP = currentCPP;   // 中断開始時のCPP値を保存
        pauseStartTime = now();        // 中断開始時刻を記録
      }
      // 逆S字減衰: 3秒でゼロになるよう設計
      // 変曲点 tau_d = 1.5秒（3秒の中間）、傾き k_d = 2.5（急峻）
      // t=0: 残存≈100%、t=1.5秒: 残存≈50%、t=3秒: 残存≈ほぼ0%
      const pauseElapsed = now() - (pauseStartTime || now());
      const k_d   = 2.5;  // 傾き（急峻なS字）
      const tau_d = 1.5;  // 変曲点（秒）
      // 正規化: t=0 で1、t→∞ で0 になるよう補正
      const sig0 = 1 / (1 + Math.exp(-k_d * (0            - tau_d)));
      const sigT = 1 / (1 + Math.exp(-k_d * (pauseElapsed - tau_d)));
      const sigInf = 0; // t→∞ での sigmoid → 1 なので 1-sigmoid → 0
      const remain = Math.max(0, (1 - sigT - (1 - 1)) / (1 - sig0));
      // remain = (1-sigT)/(1-sig0): t=0→1、t=1.5→0.5、t=3→ほぼ0
      currentCPP = pauseStartCPP * Math.max(0, (1 - sigT) / (1 - sig0));
      if (currentCPP < 0.3) currentCPP = 0;
    }

    chartLabels.push(fmt(t));
    chartData.push(parseFloat(ccf.toFixed(1)));
    cppData.push(parseFloat(currentCPP.toFixed(1)));
    // 500ms×240点=120秒分保持
    if (chartLabels.length > 240) { chartLabels.shift(); chartData.shift(); cppData.shift(); }
    myChart.update('none');
  }

  // ── 閾値チェック ─────────────────────────────────
  const THRESHOLDS = { vent: 3, rhythm: 7, unknown: 10, pause: 10 };
  function isOverThreshold(type, dur) {
    return dur !== undefined && THRESHOLDS[type] !== undefined && dur > THRESHOLDS[type];
  }
  function isCombinedOver(logs) {
    const total = logs.reduce((s, l) => s + ((l.type === 'vent' || l.type === 'rhythm') && l.dur !== undefined ? l.dur : 0), 0);
    return total >= 10;
  }

  // ── Log ───────────────────────────────────────────
  function addLog(type, label, sec, dur) {
    logs.unshift({ type, label, sec, dur });
    renderLog();
  }

  function renderLog() {
    const combined = isCombinedOver(logs);
    const logEl = document.getElementById('log');
    logEl.innerHTML = logs.slice(0, 30).map(l => {
      const over = isOverThreshold(l.type, l.dur);
      const style = over ? 'color:#E24B4A;font-weight:500;' : 'color:var(--text)';
      const warn  = over ? ' <span style="color:#E24B4A;font-size:11px;">⚠ 超過</span>' : '';
      return `<div class="log-row">
        <span style="${style}">${l.label}${warn}</span>
        <div style="display:flex;align-items:center;">
          <span class="log-tag ${tagClass(l.type)}">${tagLabel(l.type)}</span>
          <span class="log-time">${fmt(l.sec)}</span>
        </div>
      </div>`;
    }).join('') + (combined ? `<div style="padding:6px 12px;font-size:12px;color:#E24B4A;font-weight:500;">⚠ 換気＋波形確認の合計が10秒を超えています</div>` : '');
  }

  // ── Report ────────────────────────────────────────
  function updateReport(t, comp, pause, ccf) {
    const now_str = new Date().toLocaleString('ja-JP');
    const combined = isCombinedOver(logs);
    const logLines = logs.slice().reverse().map(l => {
      const over = isOverThreshold(l.type, l.dur);
      const warn = over ? ' [⚠超過]' : '';
      return fmt(l.sec) + '  ' + tagLabel(l.type) + '  ' + l.label + warn;
    });
    const warnings = [];
    if (combined) warnings.push('⚠ 換気＋波形確認の合計が10秒を超えています');
    const lines = [
      '=== CPR セッションレポート ===',
      '記録日時　: ' + now_str,
      '経過時間　: ' + fmt(t),
      '圧迫時間　: ' + fmtS(comp) + ' 秒',
      '中断時間　: ' + fmtS(pause) + ' 秒',
      'CCF　　　: ' + ccf + ' %  ' + (ccf >= 80 ? '[良好]' : ccf >= 60 ? '[要改善]' : '[不十分]'),
      ...(warnings.length ? ['', ...warnings] : []),
      '',
      '--- イベントログ ---',
      ...logLines
    ];
    const el = document.getElementById('report-box');
    el.innerHTML = lines.map(line => {
      if (line.includes('⚠')) return `<span style="color:#E24B4A;font-weight:500;">${line}</span>`;
      return `<span>${line}</span>`;
    }).join('\n');
  }

  function copyReport() {
    const text = document.getElementById('report-box').innerText;
    navigator.clipboard.writeText(text).then(() => {
      const el = document.getElementById('copy-msg');
      el.textContent = 'コピーしました';
      setTimeout(() => { el.textContent = ''; }, 2000);
    }).catch(() => {
      const el = document.getElementById('copy-msg');
      el.textContent = 'コピーできませんでした（手動でコピーしてください）';
      setTimeout(() => { el.textContent = ''; }, 3000);
    });
  }

  // ── Chart init ────────────────────────────────────
  // ── Screen Wake Lock ──────────────────────────────
  async function requestWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    } catch(e) {}
  }
  function releaseWakeLock() {
    if (wakeLock) { wakeLock.release(); wakeLock = null; }
  }
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && state === 'running') requestWakeLock();
  });

    // ── 波形表示切替 ──────────────────────────────────
  function toggleWave(type) {
    if (!myChart) return;
    const idx = type === 'ccf' ? 0 : 1;
    const btn = document.getElementById('toggle-' + type);
    const meta = myChart.getDatasetMeta(idx);
    const hidden = !meta.hidden;
    myChart.setDatasetVisibility(idx, !hidden);
    myChart.update();
    if (hidden) {
      btn.classList.remove('active-ccf', 'active-cpp');
    } else {
      btn.classList.add(type === 'ccf' ? 'active-ccf' : 'active-cpp');
    }
    // 非表示の場合は対応する軸も隠す
    const scaleKey = type === 'ccf' ? 'y' : 'y2';
    myChart.options.scales[scaleKey].display = !hidden;
    myChart.update();
  }

  function initChart() {
    const isDark   = matchMedia('(prefers-color-scheme: dark)').matches;
    const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
    const textColor = isDark ? '#6b6b68' : '#9e9e9a';
    const ctx = document.getElementById('ccfChart').getContext('2d');

    Chart.register({
      id: 'zones',
      beforeDraw(chart) {
        const { ctx: c, chartArea, scales } = chart;
        if (!chartArea) return;
        const y80 = scales.y.getPixelForValue(80);
        const y60 = scales.y.getPixelForValue(60);
        c.save();
        c.fillStyle = 'rgba(29,158,117,0.07)';
        c.fillRect(chartArea.left, chartArea.top, chartArea.right - chartArea.left, y80 - chartArea.top);
        c.fillStyle = 'rgba(186,117,23,0.07)';
        c.fillRect(chartArea.left, y80, chartArea.right - chartArea.left, y60 - y80);
        c.fillStyle = 'rgba(226,75,74,0.07)';
        c.fillRect(chartArea.left, y60, chartArea.right - chartArea.left, chartArea.bottom - y60);
        c.strokeStyle = 'rgba(29,158,117,0.35)'; c.setLineDash([4,3]); c.lineWidth = 1;
        c.beginPath(); c.moveTo(chartArea.left, y80); c.lineTo(chartArea.right, y80); c.stroke();
        c.strokeStyle = 'rgba(186,117,23,0.35)';
        c.beginPath(); c.moveTo(chartArea.left, y60); c.lineTo(chartArea.right, y60); c.stroke();
        c.restore();
      }
    });

    myChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: chartLabels,
        datasets: [
          {
            label: 'CCF',
            data: chartData,
            borderWidth: 2,
            pointRadius: 0,
            tension: 0.4,
            cubicInterpolationMode: 'monotone',
            fill: false,
            yAxisID: 'y',
            segment: { borderColor: ctx => ccfColor(ctx.p1.parsed.y) }
          },
          {
            label: 'CPP',
            data: cppData,
            borderWidth: 2,
            borderColor: '#9B59B6',
            borderDash: [5, 3],
            pointRadius: 0,
            tension: 0.4,
            cubicInterpolationMode: 'monotone',
            fill: false,
            yAxisID: 'y2'
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        plugins: {
          legend: {
            display: true,
            position: 'top',
            labels: {
              color: textColor,
              font: { size: 11 },
              boxWidth: 24,
              padding: 10,
              generateLabels: chart => [
                { text: 'CCF (%)', fillStyle: 'transparent', strokeStyle: '#1D9E75', lineWidth: 2, hidden: false, datasetIndex: 0 },
                { text: 'CPP (mmHg)', fillStyle: 'transparent', strokeStyle: '#9B59B6', lineWidth: 2, lineDash: [5,3], hidden: false, datasetIndex: 1 }
              ]
            }
          },
          tooltip: {
            callbacks: {
              label: c => c.datasetIndex === 0
                ? 'CCF: ' + Math.round(c.parsed.y) + '%'
                : 'CPP: ' + Math.round(c.parsed.y) + ' mmHg'
            }
          }
        },
        scales: {
          x: {
            ticks: { color: textColor, font: { size: 11 }, maxTicksLimit: 6, autoSkip: true },
            grid:  { color: gridColor }
          },
          y: {
            min: 0, max: 100,
            position: 'left',
            ticks: { color: textColor, font: { size: 11 }, callback: v => v + '%' },
            grid:  { color: gridColor }
          },
          y2: {
            min: 0, max: 50,
            position: 'right',
            ticks: { color: '#9B59B6', font: { size: 11 }, callback: v => v + '' },
            grid:  { drawOnChartArea: false },
            title: { display: true, text: 'mmHg', color: '#9B59B6', font: { size: 10 } }
          }
        }
      }
    });
  }

  initChart();
</script>
